<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Interaktif</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .calculator {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 280px;
      }

      .display {
        width: 100%;
        height: 60px;
        margin-bottom: 15px;
        font-size: 24px;
        text-align: right;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #e5e7eb;
        transition: 0.2s;
      }

      button:hover {
        background: #d1d5db;
      }

      .operator {
        background: #60a5fa;
        color: white;
      }

      .equal {
        background: #22c55e;
        color: white;
      }

      .clear {
        background: #ef4444;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <input type="text" class="display" id="display" readonly />

      <div class="buttons" id="buttons">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-value="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-value="*">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-value="-">−</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equal" data-value="=">=</button>
        <button class="operator" data-value="+">+</button>

        <button class="clear" data-value="C" style="grid-column: span 4">
          C
        </button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
