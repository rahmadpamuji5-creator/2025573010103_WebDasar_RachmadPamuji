<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f3f4f6;
        padding: 20px;
      }

      h1 {
        margin-bottom: 20px;
        text-align: center;
      }

      .container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }

      /* PRODUK */
      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }

      .card-content {
        padding: 15px;
      }

      .card h3 {
        margin-bottom: 10px;
      }

      .price {
        color: green;
        font-weight: bold;
        margin-bottom: 12px;
      }

      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      /* KERANJANG */
      .cart {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        height: fit-content;
        position: sticky;
        top: 20px;
      }

      .cart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .badge {
        background: red;
        color: white;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 14px;
      }

      .cart-item {
        border-bottom: 1px solid #ddd;
        padding: 10px 0;
      }

      .cart-item h4 {
        margin-bottom: 5px;
      }

      .qty-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }

      .qty-btn {
        width: 30px;
        height: 30px;
        border: none;
        background: #e5e7eb;
        border-radius: 6px;
        cursor: pointer;
      }

      .remove-btn {
        margin-top: 10px;
        padding: 6px 10px;
        border: none;
        background: crimson;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      .total {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }

      .checkout {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        border: none;
        background: green;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .checkout:hover {
        background: darkgreen;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <h1>Shopping Cart</h1>

    <div class="container">
      <!-- PRODUK -->
      <div class="products" id="product-list">
        <div class="card">
          <img src="https://picsum.photos/300?random=1" alt="" />
          <div class="card-content">
            <h3>Laptop</h3>
            <p class="price">Rp 7.000.000</p>
            <button
              class="btn"
              data-id="1"
              data-name="Laptop"
              data-price="7000000"
            >
              Tambah ke Keranjang
            </button>
          </div>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300?random=2" alt="" />
          <div class="card-content">
            <h3>Headphone</h3>
            <p class="price">Rp 500.000</p>
            <button
              class="btn"
              data-id="2"
              data-name="Headphone"
              data-price="500000"
            >
              Tambah ke Keranjang
            </button>
          </div>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300?random=3" alt="" />
          <div class="card-content">
            <h3>Keyboard</h3>
            <p class="price">Rp 350.000</p>
            <button
              class="btn"
              data-id="3"
              data-name="Keyboard"
              data-price="350000"
            >
              Tambah ke Keranjang
            </button>
          </div>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300?random=4" alt="" />
          <div class="card-content">
            <h3>Mouse</h3>
            <p class="price">Rp 200.000</p>
            <button
              class="btn"
              data-id="4"
              data-name="Mouse"
              data-price="200000"
            >
              Tambah ke Keranjang
            </button>
          </div>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300?random=5" alt="" />
          <div class="card-content">
            <h3>Monitor</h3>
            <p class="price">Rp 2.000.000</p>
            <button
              class="btn"
              data-id="5"
              data-name="Monitor"
              data-price="2000000"
            >
              Tambah ke Keranjang
            </button>
          </div>
        </div>
      </div>

      <!-- KERANJANG -->
      <div class="cart">
        <div class="cart-header">
          <h2>Keranjang</h2>
          <span class="badge" id="cart-count">0</span>
        </div>

        <div id="cart-items"></div>

        <div class="total">Total: Rp <span id="total-price">0</span></div>

        <button class="checkout" id="checkout-btn">Checkout</button>
      </div>
    </div>

    <script src="latihan-2.js"></script>
  </body>
</html>
